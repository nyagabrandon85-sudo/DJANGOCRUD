{%extends 'base.html'%}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<div class="container">
    <h1 class="text-warning text-center">Admin Dashboard</h1>
    <table class="table table-info table-striped-columns">
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for x in students %}
            <tr>
                <td>{{x.id}}</td>
                <td>{{x.firstname}}</td>
                <td>{{x.lastname}}</td>
                <td>{{x.age}}</td>
                <td>{{x.course}}</td></td>
                <td>
                    <a href="{% url 'delete' x.id %}" class="btn btn-danger">DELETE</a>
                    <a href="" class="btn btn-warning">UPDATE</a>
                </td>
            </tr>
        </tbody>
        {% endfor %}
    </table>
</div>
{% endblock %}
